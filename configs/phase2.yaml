# ──────────────────────────────────────────────────────────────────
# Phase 2 Agent Configuration
# ──────────────────────────────────────────────────────────────────

llm:
  provider: "gemini"
  model: "gemini-2.0-flash"
  temperature: 0.1
  max_tokens: 2048
  max_retries: 5

agent:
  use_verifier: true
  verifier_threshold: 0.7
  max_features_in_prompt: 10

evaluation:
  hard_cases_only: false
  save_reasoning_trace: true
